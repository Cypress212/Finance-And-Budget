<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wealth Ledger</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --paper: #f4f1ea; --ink: #1a1a1a; --border: #c2b280; 
            --accent: #2c5e50; --danger: #8b0000; 
        }
        
        body { 
            font-family: 'Georgia', serif; background-color: #dcd0c0; 
            color: var(--ink); margin: 0; padding: 20px; line-height: 1.6;
        }

        .ledger-container {
            max-width: 500px; margin: 0 auto; background: var(--paper);
            border: 2px solid var(--border); box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            padding: 30px; border-radius: 2px;
        }

        h1, h2, h3 { 
            text-align: center; text-transform: uppercase; 
            letter-spacing: 2px; border-bottom: 2px solid var(--border);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        /* Chart Styling */
        .chart-box { 
            background: white; border: 1px solid var(--border); 
            padding: 15px; margin-bottom: 25px; height: 250px;
        }

        /* Input Fields - The "Stationery" look */
        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: transparent; border: none;
            border-bottom: 1px solid var(--border);
            font-family: 'Georgia', serif; font-size: 1rem;
            box-sizing: border-box; outline: none;
        }

        input:focus { border-bottom: 2px solid var(--accent); }

        /* The "Seal" Button */
        .btn-log {
            background: var(--accent); color: var(--paper);
            border: none; padding: 15px; width: 100%;
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-log:hover { background: #1e4036; }

        /* Transaction List - Styled like an old receipt */
        .history-list { margin-top: 30px; font-size: 0.9rem; }
        .entry {
            display: flex; justify-content: space-between;
            border-bottom: 1px dashed var(--border);
            padding: 8px 0;
        }
        .entry-amt { font-weight: bold; color: var(--danger); }
    </style>
</head>
<body>

    <div class="ledger-container">
        <h1>Wealth Ledger</h1>

        <div class="chart-box">
            <canvas id="classicChart"></canvas>
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <small>Current Total Expenditure</small>
            <div style="font-size: 2rem; font-weight: bold;">$<span id="totalDisplay">0.00</span></div>
        </div>

        <h3>Log New Entry</h3>
        <input type="number" id="amt" placeholder="Amount ($)" inputmode="decimal">
        <select id="cat">
            <option value="Food">Provisions (Food)</option>
            <option value="Bills">Obligations (Bills)</option>
            <option value="Fun">Leisure (Fun)</option>
            <option value="Other">Sundries (Other)</option>
        </select>
        <input type="text" id="desc" placeholder="Memorandum (Description)">
        <button class="btn-log" onclick="saveEntry()">Commit to Ledger</button>

        <div class="history-list" id="history">
            </div>
    </div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    let entries = JSON.parse(localStorage.getItem('classic_ledger') || "[]");
    let ledgerChart;

    window.onload = () => {
        const ctx = document.getElementById('classicChart').getContext('2d');
        ledgerChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Food', 'Bills', 'Fun', 'Other'],
                datasets: [{
                    data: [0, 0, 0, 0],
                    backgroundColor: ['#2c5e50', '#4a4a4a', '#8b0000', '#c2b280'],
                    borderColor: '#f4f1ea',
                    borderWidth: 2
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
        updateUI();
    };

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        const cat = document.getElementById('cat').value;
        const desc = document.getElementById('desc').value || cat;
        if (!amt) return;

        entries.unshift({ amt, cat, desc, date: new Date().toLocaleDateString() });
        localStorage.setItem('classic_ledger', JSON.stringify(entries));
        
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function updateUI() {
        const totals = { Food: 0, Bills: 0, Fun: 0, Other: 0 };
        let grandTotal = 0;

        entries.forEach(e => {
            totals[e.cat] += e.amt;
            grandTotal += e.amt;
        });

        document.getElementById('totalDisplay').innerText = grandTotal.toFixed(2);
        ledgerChart.data.datasets[0].data = [totals.Food, totals.Bills, totals.Fun, totals.Other];
        ledgerChart.update();

        document.getElementById('history').innerHTML = entries.slice(0, 10).map(e => `
            <div class="entry">
                <span>${e.date} | ${e.desc}</span>
                <span class="entry-amt">-$${e.amt.toFixed(2)}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
