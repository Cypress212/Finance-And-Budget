<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Commander MK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; 
            --shadow: #a3b1c6; 
            --highlight: #ffffff;
            --accent: #2d5a27; /* Deep Malawian Green */
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); color: #444; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        /* The Neumorphic Card Style */
        .neu-card {
            background: var(--bg);
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box;
        }

        .total-box { text-align: center; margin-bottom: 10px; }
        .total-box h1 { font-size: 2.2rem; margin: 5px 0; color: var(--accent); }

        /* Neumorphic Inputs */
        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: #444; font-size: 1rem; outline: none; box-sizing: border-box;
        }

        /* Neumorphic Button */
        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .btn-push:active {
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight);
            transform: scale(0.98);
        }

        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin-bottom: 10px; border-radius: 10px;
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
            background: var(--bg); font-size: 0.9rem;
        }
        
        .chart-wrap { height: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="neu-card total-box">
        <small style="text-transform: uppercase; letter-spacing: 1px; color: #777;">Balance Spent</small>
        <h1>MK <span id="totalDisplay">0</span></h1>
        <div class="chart-wrap">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <div class="neu-card">
        <input type="number" id="amt" placeholder="Enter Amount (MK)" inputmode="decimal">
        <select id="cat">
            <option value="Food">Groceries / Food</option>
            <option value="Transport">Transport / Fuel</option>
            <option value="Bills">Monthly Bills</option>
            <option value="Fun">Leisure / Fun</option>
        </select>
        <input type="text" id="desc" placeholder="Details (e.g. Minibus)">
        <button class="btn-push" onclick="saveEntry()">Record Entry</button>
    </div>

    <div style="width: 100%; max-width: 400px;">
        <h3 style="margin-left: 10px; font-size: 0.9rem; color: #777;">RECENT ACTIVITY</h3>
        <div id="history"></div>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('mw_neu_ledger') || "[]");
    let chart;

    window.onload = () => {
        const ctx = document.getElementById('financeChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Fun'],
                datasets: [{
                    data: [0, 0, 0, 0],
                    backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#444'],
                    borderWidth: 0,
                    cutout: '80%'
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } } 
            }
        });
        updateUI();
    };

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        const cat = document.getElementById('cat').value;
        const desc = document.getElementById('desc').value || cat;
        if (!amt) return;

        entries.unshift({ amt, cat, desc, date: new Date().toLocaleDateString() });
        localStorage.setItem('mw_neu_ledger', JSON.stringify(entries));
        
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function updateUI() {
        const totals = { Food: 0, Transport: 0, Bills: 0, Fun: 0 };
        let grandTotal = 0;

        entries.forEach(e => {
            if (totals[e.cat] !== undefined) totals[e.cat] += e.amt;
            grandTotal += e.amt;
        });

        document.getElementById('totalDisplay').innerText = grandTotal.toLocaleString();
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Fun];
        chart.update();

        document.getElementById('history').innerHTML = entries.slice(0, 10).map(e => `
            <div class="history-item">
                <div>
                    <strong>${e.desc}</strong><br>
                    <small style="color:gray;">${e.date}</small>
                </div>
                <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
