<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commander: Shopping Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.4s; padding-bottom: 100px; }

        @media (min-width: 1024px) {
            body { display: grid; grid-template-columns: 400px 1fr 400px; gap: 25px; height: 100vh; overflow: hidden; padding: 30px; box-sizing: border-box; }
        }

        .neu-card {
            background: var(--bg); border-radius: 25px;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--highlight);
            padding: 20px; margin-bottom: 20px; box-sizing: border-box;
        }

        .limit-header { text-align: center; border: 2px solid var(--gold); }
        .limit-value { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
        .basket-warning { font-size: 0.8rem; color: var(--danger); font-weight: bold; margin-top: 5px; display: none; }

        input, select, textarea {
            width: 100%; border: none; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow), inset -5px -5px 10px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box; font-family: inherit;
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--bg); color: var(--accent); font-weight: 900;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.98); }
        
        .btn-checkout { background: var(--accent); color: white; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        #basketList { overflow-y: auto; max-height: 300px; margin-top: 15px; }
        .basket-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
            margin-bottom: 10px; font-size: 0.9rem;
        }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--bg); border: none; box-shadow: 4px 4px 10px var(--shadow); cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="column">
    <div class="neu-card limit-header">
        <label style="font-weight: 900; font-size: 0.7rem;">DAILY REMAINING (POST-BASKET)</label>
        <div class="limit-value">MK <span id="dailyDisplay">0</span></div>
        <div id="overLimitMsg" class="basket-warning">⚠️ BASKET EXCEEDS DAILY LIMIT</div>
    </div>

    <div class="neu-card">
        <label>Scan Item Price</label>
        <input type="number" id="amt" placeholder="Enter Price (MK)" inputmode="decimal">
        <input type="text" id="desc" placeholder="Item Name (e.g. Milk)">
        <select id="cat">
            <option value="Food">🍱 Food/Groceries</option>
            <option value="Other">🌀 Other</option>
        </select>
        <button class="btn-push" onclick="addToBasket()">🛒 Add to Basket</button>
        
        <div style="margin-top: 20px;">
            <label>Monthly Goal</label>
            <input type="number" id="monthlyGoal" value="150000" oninput="updateUI()">
        </div>
    </div>
</div>

<div class="column">
    <div class="neu-card" style="height: 100%; display: flex; flex-direction: column;">
        <label>CURRENT BASKET TALLY <span id="basketCount" style="float:right; color:var(--accent)">0 Items</span></label>
        <div id="basketTotal" style="font-size: 1.8rem; font-weight: 800; margin: 10px 0;">MK 0</div>
        
        <div id="basketList">
            </div>

        <button class="btn-push btn-checkout" onclick="checkout()" id="checkoutBtn" style="display:none;">💳 Pay & Commit to Ledger</button>
        <button class="btn-push" style="color:var(--danger); font-size: 0.7rem; box-shadow: none;" onclick="clearBasket()">Empty Basket</button>
    </div>
</div>

<div class="column">
    <div class="neu-card">
        <label>MONTHLY SPEND (PAID)</label>
        <div style="font-size: 1.5rem; font-weight: 800;">MK <span id="totalPaid">0</span></div>
        <div style="height: 200px; margin-top: 15px;"><canvas id="mainChart"></canvas></div>
    </div>
    
    <div class="neu-card" style="flex: 1; overflow-y: auto;">
        <label>PAID HISTORY</label>
        <div id="paidHistory" style="font-size: 0.8rem; opacity: 0.8;"></div>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('mw_ledger_v4') || "[]");
    let basket = [];
    let currentTheme = 'light';
    let chart;

    window.onload = () => {
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Food', 'Other'], datasets: [{ data: [1,1], backgroundColor: ['#2d5a27', '#b19470'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function addToBasket() {
        const amt = parseFloat(document.getElementById('amt').value);
        const desc = document.getElementById('desc').value || "Unnamed Item";
        const cat = document.getElementById('cat').value;
        
        if (!amt) return;
        
        basket.push({ id: Date.now(), amt, desc, cat });
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function clearBasket() {
        basket = [];
        updateUI();
    }

    function checkout() {
        if (basket.length === 0) return;
        
        // Move basket items to entries
        const timestamp = new Date().getTime();
        basket.forEach(item => {
            entries.unshift({ ...item, timestamp });
        });
        
        localStorage.setItem('mw_ledger_v4', JSON.stringify(entries));
        basket = [];
        updateUI();
        alert("Transaction Recorded!");
    }

    function updateUI() {
        const goal = parseFloat(document.getElementById('monthlyGoal').value) || 0;
        const now = new Date();
        
        // Calculate Permanent Spend
        const paidThisMonth = entries.filter(e => {
            const d = new Date(e.timestamp);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
        const totalPaid = paidThisMonth.reduce((s, e) => s + e.amt, 0);
        
        // Calculate Basket Total
        const basketTotal = basket.reduce((s, e) => s + e.amt, 0);
        
        // Calculate Daily Limit
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (daysInMonth - now.getDate()) + 1;
        // Logic: (Goal - Total Paid - What's in Basket right now) / Days left
        const dailyRemaining = Math.floor((goal - totalPaid - basketTotal) / daysLeft);

        // Update Displays
        document.getElementById('dailyDisplay').innerText = Math.max(0, dailyRemaining).toLocaleString();
        document.getElementById('totalPaid').innerText = totalPaid.toLocaleString();
        document.getElementById('basketTotal').innerText = `MK ${basketTotal.toLocaleString()}`;
        document.getElementById('basketCount').innerText = `${basket.length} Items`;
        document.getElementById('overLimitMsg').style.display = dailyRemaining < 0 ? 'block' : 'none';
        document.getElementById('checkoutBtn').style.display = basket.length > 0 ? 'block' : 'none';

        // Render Basket
        document.getElementById('basketList').innerHTML = basket.map((item, idx) => `
            <div class="basket-item">
                <span><b>${item.desc}</b></span>
                <span>MK ${item.amt.toLocaleString()}</span>
            </div>
        `).join('');

        // Render Paid History
        document.getElementById('paidHistory').innerHTML = paidThisMonth.slice(0,10).map(e => `
            <div style="border-bottom: 1px solid rgba(0,0,0,0.05); padding: 5px 0;">
                ${e.desc} - MK ${e.amt.toLocaleString()}
            </div>
        `).join('');

        // Update Chart
        let totals = { Food: 0, Other: 0 };
        paidThisMonth.forEach(e => { if(totals[e.cat] !== undefined) totals[e.cat] += e.amt; });
        chart.data.datasets[0].data = [totals.Food, totals.Other];
        chart.update();
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }
</script>
</body>
</html>
