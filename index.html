<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Commander MK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
    <style>
        :root { 
            --bg: #e0e5ec; 
            --shadow: #a3b1c6; 
            --highlight: #ffffff;
            --accent: #2d5a27;
            --danger: #d32f2f;
            --gold: #b19470;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: #444; 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box;
        }

        .view { display: none; width: 100%; max-width: 400px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.8rem; color: var(--accent); margin: 5px 0; }
        .allowance-vibe { font-size: 2.2rem; color: var(--gold); font-weight: 800; margin: 5px 0; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #777; letter-spacing: 1px; margin-bottom: 5px; }

        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: #444; font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: #777; cursor: pointer; padding: 10px; }
        .nav-btn.active { color: var(--accent); }

        .history-item {
            display: flex; justify-content: space-between; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
        }
    </style>
</head>
<body>

    <div id="dashView" class="view active">
        <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
            <label>Daily Allowance Left</label>
            <div class="allowance-vibe">MK <span id="dailyLimitDisplay">0</span></div>
            <small style="color:#777">Based on remaining days</small>
        </div>

        <div class="neu-card" style="text-align: center;">
            <label>Total Spent This Month</label>
            <h1>MK <span id="totalDisplay">0</span></h1>
            <div style="height: 150px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="neu-card">
            <label>Set Monthly Budget Goal (MK)</label>
            <input type="number" id="monthlyGoal" placeholder="e.g. 300000" oninput="updateUI()">
            
            <label>New Entry</label>
            <input type="number" id="amt" placeholder="Amount (MK)">
            <select id="cat">
                <option value="Food">Groceries</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="desc" placeholder="Details...">
            <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Records</h3>
                <button onclick="clearData()" style="color:var(--danger); border:none; background:none; font-weight:bold; cursor:pointer;">Clear All</button>
            </div>
            <div id="fullHistory"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Home</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Ledger</button>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('mw_final_ledger_v2') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal') || 0;
    let chart;

    window.onload = () => {
        document.getElementById('monthlyGoal').value = monthlyGoal;
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{
                    data: [1,1,1,1],
                    backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#444'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
        updateUI();
    };

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        const cat = document.getElementById('cat').value;
        const desc = document.getElementById('desc').value || cat;
        if (!amt) return;

        entries.unshift({ amt, cat, desc, date: new Date().toLocaleDateString() });
        localStorage.setItem('mw_final_ledger_v2', JSON.stringify(entries));
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function updateUI() {
        const goalInput = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal', goalInput);
        
        const totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        let grandTotal = 0;
        
        entries.forEach(e => {
            if (totals[e.cat] !== undefined) totals[e.cat] += e.amt;
            grandTotal += e.amt;
        });

        document.getElementById('totalDisplay').innerText = grandTotal.toLocaleString();
        
        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (lastDay - now.getDate()) + 1;
        
        const remainingBudget = goalInput - grandTotal;
        const dailyAllowance = remainingBudget > 0 ? (remainingBudget / daysLeft) : 0;
        
        document.getElementById('dailyLimitDisplay').innerText = Math.floor(dailyAllowance).toLocaleString();
        
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
        chart.update();
    }

    function renderHistory() {
        document.getElementById('fullHistory').innerHTML = entries.map(e => `
            <div class="history-item">
                <div><strong>${e.desc}</strong><br><small>${e.date}</small></div>
                <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
            </div>
        `).join('') || '<p style="text-align:center;">No records yet.</p>';
    }

    function clearData() {
        if(confirm("Wipe all data?")) {
            localStorage.removeItem('mw_final_ledger_v2');
            entries = [];
            updateUI();
            renderHistory();
        }
    }
</script>
</body>
</html>
