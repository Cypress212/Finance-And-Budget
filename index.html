<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Commander MK - Secure</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.3s ease;
        }

        /* LOCK SCREEN STYLES */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg); border: none; box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; z-index: 1000;
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box;
        }

        .view { display: none; width: 100%; max-width: 400px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .allowance-vibe { font-size: 2.2rem; color: var(--gold); font-weight: 800; margin: 5px 0; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; font-weight: bold; }

        .progress-container {
            width: 100%; height: 12px; background: var(--bg); border-radius: 10px;
            box-shadow: inset 3px 3px 6px var(--shadow), inset -3px -3px 6px var(--highlight);
            margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; border-radius: 10px; }

        .status-badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem;
            font-weight: bold; text-transform: uppercase; margin-top: 10px;
            box-shadow: 3px 3px 6px var(--shadow), -3px -3px 6px var(--highlight);
        }

        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: var(--text); font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 10px; font-size: 0.8rem;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            z-index: 100;
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: var(--text); opacity: 0.5; cursor: pointer; padding: 10px; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .history-item {
            display: flex; flex-direction: column; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
        }
        .receipt-thumb { width: 100%; border-radius: 10px; margin-top: 10px; cursor: zoom-in; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="neu-card" style="text-align: center;">
            <div style="font-size: 50px; margin-bottom: 15px;">🔒</div>
            <h2 style="color: var(--accent);">Vault Locked</h2>
            <p style="opacity: 0.7; font-size: 0.8rem; margin-bottom: 25px;">Biometric verification required to view financial data.</p>
            <button class="btn-push" onclick="triggerBiometric()">🔓 Unlock Vault</button>
            <div id="lock-error" style="color: var(--danger); font-size: 0.7rem; margin-top: 15px; font-weight: bold;"></div>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="dashView" class="view active">
        <div class="neu-card" style="text-align: center;">
            <label id="monthProgressLabel">Month Progress</label>
            <div class="progress-container"><div id="monthProgressFill" class="progress-fill"></div></div>
            <div id="daysLeftText" style="font-size: 0.8rem; font-weight: bold;">-- Days Left</div>
            <div id="statusBadge" class="status-badge">Commander Status</div>
        </div>

        <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
            <label>Daily Allowance Left</label>
            <div class="allowance-vibe">MK <span id="dailyLimitDisplay">0</span></div>
        </div>

        <div class="neu-card" style="text-align: center;">
            <label>Spent in <span id="currMonthName">Month</span></label>
            <h1>MK <span id="totalDisplay">0</span></h1>
            <div style="height: 120px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="neu-card">
            <label>New Entry</label>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <select id="cat">
                <option value="Food">Groceries</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="desc" placeholder="Details...">
            
            <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="previewReceipt(this)">
            <button class="btn-push" style="color:var(--gold)" onclick="document.getElementById('cam-input').click()">📸 Snap Receipt</button>
            <img id="receipt-preview" src="" style="width:100%; border-radius:15px; margin-bottom:15px; display:none;">

            <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
            <input type="number" id="monthlyGoal" placeholder="Monthly Goal (MK)" oninput="updateUI()" style="margin-top:20px; font-size:0.8rem">
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeMonth(-1)" style="opacity:1">◀</button>
                <div id="displayMonth" style="font-weight:bold; color:var(--accent);">Month Year</div>
                <button class="nav-btn" onclick="changeMonth(1)" style="opacity:1">▶</button>
            </div>
            <div id="fullHistory"></div>
            
            <hr style="opacity:0.1; margin: 20px 0;">
            <button class="btn-push" style="font-size:0.7rem;" onclick="exportToCSV()">📤 Export to CSV (Excel)</button>
            <button onclick="clearData()" style="color:var(--danger); border:none; background:none; font-weight:bold; width:100%; margin-top:10px; font-size:0.7rem;">WIPE DATA</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Home</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Ledger</button>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('mw_pro_ledger_v2') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal_v1') || 0;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let viewDate = new Date();
    let receiptData = null;
    let chart;

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    // 🔐 BIOMETRIC HANDLER WITH FAIL-SAFE
    async function triggerBiometric() {
        const errorEl = document.getElementById('lock-error');
        const isSecure = window.isSecureContext && window.PublicKeyCredential;

        if (!isSecure) {
            errorEl.innerHTML = `Not on HTTPS connection.<br><button onclick="unlockVault()" class="btn-push" style="margin-top:10px; font-size:0.7rem;">DEBUG UNLOCK</button>`;
            return;
        }

        try {
            const options = {
                publicKey: {
                    challenge: new Uint8Array([1, 2, 3, 4]),
                    rp: { name: "Wealth Commander" },
                    user: { id: new Uint8Array([1]), name: "user", displayName: "User" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    timeout: 60000,
                    authenticatorSelection: { userVerification: "required" }
                }
            };
            await navigator.credentials.create(options);
            unlockVault();
        } catch (err) {
            errorEl.innerHTML = `Hardware Auth Failed.<br><button onclick="unlockVault()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer; margin-top:10px;">FORCE BYPASS</button>`;
        }
    }

    function unlockVault() {
        document.getElementById('lock-screen').style.display = 'none';
    }

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        document.getElementById('monthlyGoal').value = monthlyGoal;
        initChart();
        updateUI();
    };

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{
                    data: [1,1,1,1],
                    backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function previewReceipt(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                receiptData = e.target.result;
                const p = document.getElementById('receipt-preview');
                p.src = receiptData; p.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateUI() {
        const goalInput = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal_v1', goalInput);
        const now = new Date();
        
        let filtered = entries.filter(e => {
            let d = new Date(e.timestamp);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });

        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        let grandTotal = 0;
        filtered.forEach(e => { totals[e.cat] += e.amt; grandTotal += e.amt; });

        document.getElementById('totalDisplay').innerText = grandTotal.toLocaleString();
        document.getElementById('currMonthName').innerText = months[now.getMonth()];
        
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const currentDay = now.getDate();
        const daysLeft = (lastDay - currentDay) + 1;
        const monthProgress = (currentDay / lastDay) * 100;
        
        document.getElementById('monthProgressFill').style.width = monthProgress + "%";
        document.getElementById('daysLeftText').innerText = `${daysLeft} Days Left`;

        const remainingBudget = goalInput - grandTotal;
        const dailyAllowance = remainingBudget > 0 ? (remainingBudget / daysLeft) : 0;
        document.getElementById('dailyLimitDisplay').innerText = Math.floor(dailyAllowance).toLocaleString();

        const badge = document.getElementById('statusBadge');
        if (remainingBudget < 0) {
            badge.innerText = "Over Budget"; badge.style.color = "var(--danger)";
        } else if (dailyAllowance < (goalInput/lastDay) * 0.5) {
            badge.innerText = "Tactical Saving"; badge.style.color = "var(--gold)";
        } else {
            badge.innerText = "Wealth Commander"; badge.style.color = "var(--accent)";
        }
        
        if(chart) {
            chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
            chart.update();
        }
    }

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        if (!amt) return;
        entries.unshift({
            amt: amt,
            cat: document.getElementById('cat').value,
            desc: document.getElementById('desc').value || document.getElementById('cat').value,
            receipt: receiptData,
            timestamp: new Date().getTime()
        });
        localStorage.setItem('mw_pro_ledger_v2', JSON.stringify(entries));
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('receipt-preview').style.display = 'none';
        receiptData = null;
        updateUI();
    }

    function exportToCSV() {
        if (entries.length === 0) return alert("No data to export");
        let csv = "Date,Description,Category,Amount(MK)\n";
        entries.forEach(e => {
            let d = new Date(e.timestamp).toLocaleDateString();
            csv += `${d},"${e.desc}",${e.cat},${e.amt}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', `Wealth_Ledger_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
            updateUI();
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function renderHistory() {
        const mLabel = months[viewDate.getMonth()] + " " + viewDate.getFullYear();
        document.getElementById('displayMonth').innerText = mLabel;
        const filtered = entries.filter(e => {
            let d = new Date(e.timestamp);
            return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear();
        });
        document.getElementById('fullHistory').innerHTML = filtered.map(e => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <div><strong>${e.desc}</strong><br><small>${new Date(e.timestamp).toLocaleDateString()}</small></div>
                    <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
                </div>
                ${e.receipt ? `<img src="${e.receipt}" class="receipt-thumb" onclick="window.open(this.src)">` : ''}
            </div>
        `).join('') || `<p style="text-align:center; opacity:0.5;">No records for ${mLabel}</p>`;
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderHistory(); }
    function clearData() { if(confirm("Wipe all records?")) { localStorage.removeItem('mw_pro_ledger_v2'); entries = []; updateUI(); renderHistory(); } }
</script>
</body>
</html>
