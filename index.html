<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e0e5ec">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Commander MK</title>
    
    <link rel="manifest" href='data:application/json,{"name":"Wealth Commander MK","short_name":"Commander","start_url":".","display":"standalone","background_color":"#e0e5ec","theme_color":"#2d5a27","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454282.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; padding-bottom: 100px;
            transition: background-color 0.4s ease;
            min-height: 100vh; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- MOBILE OPTIMIZED LAYOUT --- */
        .neu-card {
            background: var(--bg); border-radius: 25px;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--highlight);
            padding: 20px; margin-bottom: 20px; box-sizing: border-box;
        }

        .limit-header { text-align: center; border: 2px solid var(--gold); }
        .limit-value { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .warning { color: var(--danger); font-size: 0.75rem; font-weight: 800; display: none; }

        input, select, textarea {
            width: 100%; border: none; padding: 16px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow), inset -5px -5px 10px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box; font-size: 16px; /* 16px prevents iOS auto-zoom */
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--bg); color: var(--accent); font-weight: 900;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.97); }
        .btn-checkout { background: var(--accent); color: white !important; margin-top: 15px; }

        #basketList { overflow-y: auto; max-height: 300px; }
        .basket-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
            margin-bottom: 10px; font-size: 0.9rem;
        }

        .remove-btn {
            background: var(--bg); border: none; color: var(--danger); font-weight: 900;
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            box-shadow: 2px 2px 5px var(--shadow), -2px -2px 5px var(--highlight);
            display: flex; align-items: center; justify-content: center;
        }

        .theme-toggle { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; border-radius: 50%; background: var(--bg); border: none; box-shadow: 4px 4px 10px var(--shadow); z-index: 1000; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="neu-card limit-header">
    <label style="font-size: 0.6rem; font-weight: 900;">DAILY LIMIT (POST-BASKET)</label>
    <div class="limit-value">MK <span id="dailyDisplay">0</span></div>
    <div id="overLimitMsg" class="warning">⚠️ BASKET OVER LIMIT</div>
</div>

<div class="neu-card">
    <label>New Item</label>
    <input type="number" id="amt" placeholder="Price (MK)" inputmode="decimal">
    <input type="text" id="desc" placeholder="Item Name">
    <select id="cat">
        <option value="Food">🍱 Food</option>
        <option value="Other">🌀 Other</option>
    </select>
    <button class="btn-push" onclick="addToBasket()">🛒 Add to Basket</button>
</div>

<div class="neu-card" style="min-height: 200px;">
    <label>Current Basket <span id="basketCount" style="float:right">0</span></label>
    <div id="basketTotal" style="font-size: 1.5rem; font-weight: 800; margin: 10px 0;">MK 0</div>
    <div id="basketList"></div>
    <button class="btn-push btn-checkout" id="checkoutBtn" onclick="checkout()" style="display:none;">💳 Checkout</button>
</div>

<div class="neu-card">
    <label>Monthly Progress</label>
    <div style="height: 150px;"><canvas id="mainChart"></canvas></div>
    <input type="number" id="monthlyGoal" value="150000" oninput="updateUI()" style="margin-top:15px; font-size: 0.8rem; text-align: center;">
</div>

<script>
    // --- SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IGV2LnJlc3BvbmRXaXRoKGZldGNoKGV2LnJlcXVlc3QpKSk7').catch(() => {});
        });
    }

    let entries = JSON.parse(localStorage.getItem('commander_v6') || "[]");
    let basket = [];
    let currentTheme = localStorage.getItem('theme_v6') || 'light';
    let chart;

    window.onload = () => {
        applyTheme();
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Food', 'Other'], datasets: [{ data: [1,1], backgroundColor: ['#2d5a27', '#b19470'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function addToBasket() {
        const a = document.getElementById('amt');
        const d = document.getElementById('desc');
        const amt = parseFloat(a.value);
        if (!amt) return;
        basket.push({ id: Date.now(), amt, desc: d.value || "Item", cat: document.getElementById('cat').value });
        a.value = ''; d.value = '';
        updateUI();
    }

    function removeFromBasket(id) {
        basket = basket.filter(i => i.id !== id);
        updateUI();
    }

    function checkout() {
        basket.forEach(item => entries.unshift({ ...item, timestamp: Date.now() }));
        localStorage.setItem('commander_v6', JSON.stringify(entries));
        basket = [];
        updateUI();
        alert("Paid and Recorded!");
    }

    function updateUI() {
        const goal = parseFloat(document.getElementById('monthlyGoal').value) || 0;
        const now = new Date();
        const paidThisMonth = entries.filter(e => new Date(e.timestamp).getMonth() === now.getMonth());
        const totalPaid = paidThisMonth.reduce((s, e) => s + e.amt, 0);
        const basketTotal = basket.reduce((s, e) => s + e.amt, 0);
        const daysLeft = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()) + 1;
        
        const remaining = Math.floor((goal - totalPaid - basketTotal) / daysLeft);
        
        document.getElementById('dailyDisplay').innerText = remaining.toLocaleString();
        document.getElementById('basketTotal').innerText = `MK ${basketTotal.toLocaleString()}`;
        document.getElementById('basketCount').innerText = basket.length;
        document.getElementById('overLimitMsg').style.display = remaining < 0 ? 'block' : 'none';
        document.getElementById('checkoutBtn').style.display = basket.length > 0 ? 'block' : 'none';

        document.getElementById('basketList').innerHTML = basket.map(i => `
            <div class="basket-item">
                <span><b>${i.desc}</b><br><small>MK ${i.amt.toLocaleString()}</small></span>
                <button class="remove-btn" onclick="removeFromBasket(${i.id})">✕</button>
            </div>
        `).join('');

        let totals = { Food: 0, Other: 0 };
        paidThisMonth.forEach(e => totals[e.cat] += e.amt);
        chart.data.datasets[0].data = [totals.Food, totals.Other];
        chart.update();
    }

    function applyTheme() {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme_v6', currentTheme);
        applyTheme();
    }
</script>
</body>
</html>
