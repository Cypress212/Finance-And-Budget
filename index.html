<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Commander MK</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* THEME VARIABLES */
        :root { 
            --bg: #e0e5ec; 
            --shadow: #a3b1c6; 
            --highlight: #ffffff;
            --accent: #2d5a27;
            --danger: #d32f2f;
            --gold: #b19470;
            --text: #444;
        }

        [data-theme="dark"] {
            --bg: #1d2126;
            --shadow: #121519;
            --highlight: #282d34;
            --accent: #4caf50;
            --text: #e0e0e0;
            --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.3s ease;
        }

        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg); border: none;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; font-size: 1.2rem; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box; transition: all 0.3s ease;
        }

        .view { display: none; width: 100%; max-width: 400px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.8rem; color: var(--accent); margin: 5px 0; }
        .allowance-vibe { font-size: 2.2rem; color: var(--gold); font-weight: 800; margin: 5px 0; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text); opacity: 0.7; letter-spacing: 1px; margin-bottom: 5px; }

        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: var(--text); font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            z-index: 100;
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: var(--text); opacity: 0.5; cursor: pointer; padding: 10px; font-size: 1rem; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .history-item {
            display: flex; justify-content: space-between; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="dashView" class="view active">
        <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
            <label>Daily Allowance Left</label>
            <div class="allowance-vibe">MK <span id="dailyLimitDisplay">0</span></div>
        </div>

        <div class="neu-card" style="text-align: center;">
            <label>Total Spent This Month</label>
            <h1>MK <span id="totalDisplay">0</span></h1>
            <div style="height: 150px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="neu-card">
            <label>Monthly Budget Goal (MK)</label>
            <input type="number" id="monthlyGoal" placeholder="Set Goal" oninput="updateUI()">
            
            <label>New Record</label>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <select id="cat">
                <option value="Food">Groceries</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="desc" placeholder="Note (e.g. Minibus)">
            <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Ledger</h3>
                <button onclick="clearData()" style="color:var(--danger); border:none; background:none; font-weight:bold; cursor:pointer;">WIPE</button>
            </div>
            <div id="fullHistory"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Home</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Ledger</button>
    </div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    let entries = JSON.parse(localStorage.getItem('mw_ledger_offline_v1') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal_v1') || 0;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let chart;

    window.onload = () => {
        // Apply saved theme
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        document.getElementById('monthlyGoal').value = monthlyGoal;
        initChart();
        updateUI();
    };

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        // Redraw chart to update colors for dark mode
        if(chart) {
            chart.options.plugins.legend.labels.color = currentTheme === 'light' ? '#444' : '#e0e0e0';
            chart.update();
        }
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{
                    data: [1,1,1,1],
                    backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
            updateUI();
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        if (!amt) return;
        const newEntry = {
            amt: amt,
            cat: document.getElementById('cat').value,
            desc: document.getElementById('desc').value || document.getElementById('cat').value,
            date: new Date().toLocaleDateString()
        };
        entries.unshift(newEntry);
        localStorage.setItem('mw_ledger_offline_v1', JSON.stringify(entries));
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function updateUI() {
        const goalInput = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal_v1', goalInput);
        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        let grandTotal = 0;
        entries.forEach(e => { totals[e.cat] += e.amt; grandTotal += e.amt; });
        document.getElementById('totalDisplay').innerText = grandTotal.toLocaleString();
        
        const now = new Date();
        const daysLeft = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()) + 1;
        const dailyAllowance = (goalInput - grandTotal) > 0 ? ((goalInput - grandTotal) / daysLeft) : 0;
        document.getElementById('dailyLimitDisplay').innerText = Math.floor(dailyAllowance).toLocaleString();
        
        if(chart) {
            chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
            chart.update();
        }
    }

    function renderHistory() {
        document.getElementById('fullHistory').innerHTML = entries.map(e => `
            <div class="history-item">
                <div><strong>${e.desc}</strong><br><small>${e.date}</small></div>
                <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
            </div>
        `).join('') || '<p style="text-align:center;">Empty</p>';
    }

    function clearData() {
        if(confirm("Wipe all records?")) {
            localStorage.removeItem('mw_ledger_offline_v1');
            entries = [];
            updateUI();
            renderHistory();
        }
    }
</script>
</body>
</html>
