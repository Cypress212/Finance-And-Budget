<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Commander MK</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
            --sidebar-w: 0px;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.3s ease;
        }

        /* RESPONSIVE PC LAYOUT */
        @media (min-width: 850px) {
            :root { --sidebar-w: 240px; }
            body { padding-left: calc(var(--sidebar-w) + 40px); align-items: flex-start; }
            .nav-bar {
                top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
                flex-direction: column; border-radius: 0; padding: 40px 20px;
                justify-content: flex-start; gap: 10px;
            }
            .nav-btn { width: 100%; text-align: left; padding: 15px 20px; border-radius: 12px; }
            .nav-btn.active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); }
            .view.active { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1000px; }
            .neu-card { margin-bottom: 0; width: 100%; max-width: none; }
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg); border: none; box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; z-index: 1000;
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box;
        }

        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .allowance-vibe { font-size: 2.2rem; color: var(--gold); font-weight: 800; margin: 5px 0; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; font-weight: bold; }

        .progress-container {
            width: 100%; height: 12px; background: var(--bg); border-radius: 10px;
            box-shadow: inset 3px 3px 6px var(--shadow), inset -3px -3px 6px var(--highlight);
            margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; border-radius: 10px; }

        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box;
        }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            z-index: 100;
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: var(--text); opacity: 0.5; cursor: pointer; padding: 10px; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .history-item {
            display: flex; flex-direction: column; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="dashView" class="view active">
        <div class="neu-card" style="text-align: center;">
            <label>Month Progress</label>
            <div class="progress-container"><div id="monthProgressFill" class="progress-fill"></div></div>
            <div id="daysLeftText" style="font-size: 0.8rem; font-weight: bold;">-- Days Left</div>
        </div>

        <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
            <label>Daily Allowance Left</label>
            <div class="allowance-vibe">MK <span id="dailyLimitDisplay">0</span></div>
        </div>

        <div class="neu-card">
            <label>New Entry</label>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <select id="cat">
                <option value="Food">Groceries</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="desc" placeholder="Details...">
            <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
            <input type="number" id="monthlyGoal" placeholder="Monthly Goal (MK)" oninput="updateUI()" style="margin-top:20px; font-size:0.8rem">
        </div>

        <div class="neu-card" style="text-align: center;">
            <label>Spent: MK <span id="totalDisplay">0</span></label>
            <div style="height: 120px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card" style="max-width: 800px; width: 100%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeMonth(-1)" style="opacity:1">◀</button>
                <div id="displayMonth" style="font-weight:bold;">Month Year</div>
                <button class="nav-btn" onclick="changeMonth(1)" style="opacity:1">▶</button>
            </div>
            <div id="fullHistory"></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Home</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Ledger</button>
    </div>

<script>
    // --- OFFLINE SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Commander Offline Mode Active"))
        .catch(err => console.log("Offline mode failed:", err));
    }

    // --- APP LOGIC ---
    let entries = JSON.parse(localStorage.getItem('mw_pro_ledger_v2') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal_v1') || 50000;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let viewDate = new Date();
    let chart;

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('monthlyGoal').value = monthlyGoal;
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{ data: [1,1,1,1], backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'], borderWidth: 0 }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function updateUI() {
        const goal = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal_v1', goal);
        const now = new Date();
        const filtered = entries.filter(e => new Date(e.timestamp).getMonth() === now.getMonth());
        const spent = filtered.reduce((sum, e) => sum + e.amt, 0);
        
        document.getElementById('totalDisplay').innerText = spent.toLocaleString();
        const daysLeft = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()) + 1;
        document.getElementById('dailyLimitDisplay').innerText = Math.max(0, Math.floor((goal - spent) / daysLeft)).toLocaleString();
        document.getElementById('monthProgressFill').style.width = (now.getDate() / 31 * 100) + "%";
        document.getElementById('daysLeftText').innerText = `${daysLeft} Days Left`;

        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        filtered.forEach(e => totals[e.cat] += e.amt);
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
        chart.update();
    }

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        if (!amt) return;
        entries.unshift({ amt, cat: document.getElementById('cat').value, desc: document.getElementById('desc').value, timestamp: new Date().getTime() });
        localStorage.setItem('mw_pro_ledger_v2', JSON.stringify(entries));
        document.getElementById('amt').value = '';
        updateUI();
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function renderHistory() {
        document.getElementById('displayMonth').innerText = months[viewDate.getMonth()] + " " + viewDate.getFullYear();
        const filtered = entries.filter(e => new Date(e.timestamp).getMonth() === viewDate.getMonth());
        document.getElementById('fullHistory').innerHTML = filtered.map(e => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <div><strong>${e.desc || e.cat}</strong><br><small>${new Date(e.timestamp).toLocaleDateString()}</small></div>
                    <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.5;">No records.</p>';
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderHistory(); }
    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
    }
</script>
</body>
</html>
