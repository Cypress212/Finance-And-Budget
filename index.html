<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Commander</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; --warn: #f59e0b; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        .glass { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #334155; }
        
        /* The Visual Budget Bar */
        .progress-container { background: #334155; height: 25px; border-radius: 12px; overflow: hidden; margin: 15px 0; }
        #progressBar { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease, background 0.5s; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        button { background: var(--accent); border: none; color: white; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        button:active { transform: scale(0.98); }
        
        .transaction { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .amt { font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass">
        <h2 style="margin:0;">Monthly Budget</h2>
        <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <span>Spent: $<span id="totalSpent">0</span></span>
            <span>Limit: $<span id="displayLimit">1000</span></span>
        </div>
        <div class="progress-container">
            <div id="progressBar"></div>
        </div>
        <input type="number" id="setLimit" placeholder="Set Monthly Limit" onchange="updateLimit(this.value)" style="margin-top:10px;">
    </div>

    <div class="glass">
        <h3>Add Expense</h3>
        <div class="grid">
            <input type="number" id="amount" placeholder="Amount ($)">
            <select id="category">
                <option value="🍔 Food">Food</option>
                <option value="🚗 Transport">Transport</option>
                <option value="🏠 Bills">Bills</option>
                <option value="🎉 Fun">Fun</option>
            </select>
        </div>
        <input type="text" id="desc" placeholder="What did you buy?" style="margin-bottom:10px;">
        <button onclick="addExpense()">Log Expense</button>
    </div>

    <div class="glass">
        <h3>History</h3>
        <div id="history"></div>
        <button onclick="clearFinances()" style="background:var(--danger); margin-top:20px; font-size:0.8rem; padding:8px;">Reset All Data</button>
    </div>

<script>
    let budgetLimit = localStorage.getItem('budgetLimit') || 1000;
    let expenses = JSON.parse(localStorage.getItem('expenses') || "[]");

    window.onload = () => {
        document.getElementById('displayLimit').innerText = budgetLimit;
        updateUI();
    };

    function updateLimit(val) {
        budgetLimit = val;
        localStorage.setItem('budgetLimit', val);
        document.getElementById('displayLimit').innerText = val;
        updateUI();
    }

    function addExpense() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('desc').value;

        if (!amt) return;

        expenses.unshift({ amt, cat, desc, date: new Date().toLocaleDateString() });
        localStorage.setItem('expenses', JSON.stringify(expenses));
        
        // Clear inputs
        document.getElementById('amount').value = '';
        document.getElementById('desc').value = '';
        updateUI();
    }

    function updateUI() {
        const total = expenses.reduce((sum, item) => sum + item.amt, 0);
        document.getElementById('totalSpent').innerText = total.toFixed(2);

        // Update Progress Bar
        const percent = Math.min((total / budgetLimit) * 100, 100);
        const bar = document.getElementById('progressBar');
        bar.style.width = percent + "%";

        // Color Logic
        if (percent > 90) bar.style.background = "var(--danger)";
        else if (percent > 70) bar.style.background = "var(--warn)";
        else bar.style.background = "var(--accent)";

        // Render History
        document.getElementById('history').innerHTML = expenses.map(e => `
            <div class="transaction">
                <div>
                    <div>${e.cat} - ${e.desc}</div>
                    <small style="color:#888">${e.date}</small>
                </div>
                <div class="amt">-$${e.amt.toFixed(2)}</div>
            </div>
        `).join('');
    }

    function clearFinances() {
        if(confirm("Delete all financial history?")) {
            localStorage.removeItem('expenses');
            expenses = [];
            updateUI();
        }
    }
</script>
</body>
</html>
