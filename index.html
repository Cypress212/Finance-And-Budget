<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2d5a27">
    <title>Wealth Commander MK: Shopping Edition</title>

    <link rel="manifest" href='data:application/json,{"name":"Wealth Commander MK","short_name":"Commander","start_url":"index.html","display":"standalone","background_color":"#e0e5ec","theme_color":"#2d5a27","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454282.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; padding-bottom: 100px;
            transition: background-color 0.4s ease;
            min-height: 100vh; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 1024px) {
            body { display: grid; grid-template-columns: 400px 1fr 400px; gap: 30px; padding: 40px; height: 100vh; overflow: hidden; }
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--highlight);
            padding: 25px; margin-bottom: 25px; box-sizing: border-box;
        }

        .limit-header { text-align: center; border: 2px solid var(--gold); }
        .limit-value { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .warning { color: var(--danger); font-size: 0.75rem; font-weight: 800; display: none; }

        label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 10px; font-weight: 900; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; border: none; padding: 16px; margin-bottom: 15px;
            border-radius: 15px; background: var(--bg);
            box-shadow: inset 5px 5px 10px var(--shadow), inset -5px -5px 10px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box; font-size: 16px;
        }
        textarea { resize: none; overflow: hidden; min-height: 50px; }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: var(--bg); color: var(--accent); font-weight: 900;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.97); }
        .btn-checkout { background: var(--accent); color: white !important; margin-top: 15px; }

        #basketList { overflow-y: auto; max-height: 350px; }
        .basket-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-radius: 20px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
            margin-bottom: 12px;
        }

        .remove-btn {
            background: var(--bg); border: none; color: var(--danger); font-weight: 900;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow), -3px -3px 6px var(--highlight);
            display: flex; align-items: center; justify-content: center;
        }

        .theme-toggle { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--bg); border: none; box-shadow: 4px 4px 10px var(--shadow); z-index: 1000; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="column">
    <div class="neu-card limit-header">
        <label>Daily Budget (Post-Basket)</label>
        <div class="limit-value">MK <span id="dailyDisplay">0</span></div>
        <div id="overLimitMsg" class="warning">🚨 BASKET EXCEEDS DAILY LIMIT</div>
    </div>
    <div class="neu-card">
        <label>Add Item to Basket</label>
        <input type="number" id="amt" placeholder="Price (MK)" inputmode="decimal">
        <textarea id="desc" placeholder="Item Name/Details..." oninput="autoExpand(this)"></textarea>
        <select id="cat">
            <option value="Food">🍱 Food / Groceries</option>
            <option value="Transport">⛽ Transport</option>
            <option value="Other">🌀 Miscellaneous</option>
        </select>
        <button class="btn-push" onclick="addToBasket()">🛒 Add to Basket</button>
        <label style="margin-top: 25px;">Monthly Goal</label>
        <input type="number" id="monthlyGoal" value="200000" oninput="updateUI()">
    </div>
</div>

<div class="column">
    <div class="neu-card" style="display: flex; flex-direction: column;">
        <label>Live Basket Tally <span id="basketCount" style="float:right; color:var(--accent)">0 Items</span></label>
        <div id="basketTotal" style="font-size: 2rem; font-weight: 800; margin: 15px 0;">MK 0</div>
        <div id="basketList"></div>
        <div style="margin-top: auto; padding-top: 15px;">
            <button class="btn-push btn-checkout" id="checkoutBtn" onclick="checkout()" style="display:none;">💳 Pay & Record Ledger</button>
            <button class="btn-push" style="color:var(--danger); font-size: 0.7rem; box-shadow: none;" onclick="clearBasket()">Discard Basket</button>
        </div>
    </div>
</div>

<div class="column">
    <div class="neu-card">
        <label>Monthly Paid Total</label>
        <div style="font-size: 1.8rem; font-weight: 900; color: var(--accent);">MK <span id="totalPaid">0</span></div>
        <div style="height: 200px; margin-top: 20px;"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="neu-card" style="max-height: 300px; overflow-y: auto;">
        <label>Paid History (Recent)</label>
        <div id="paidHistory" style="font-size: 0.85rem;"></div>
    </div>
</div>

<script>
    // --- SERVICE WORKER (Makes it Installable) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
        });
    }

    function autoExpand(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

    let entries = JSON.parse(localStorage.getItem('commander_ledger_v10') || "[]");
    let basket = [];
    let currentTheme = localStorage.getItem('commander_theme') || 'light';
    let chart;

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Food', 'Transport', 'Other'], datasets: [{ data: [1,1,1], backgroundColor: ['#2d5a27', '#6c757d', '#b19470'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function addToBasket() {
        const a = document.getElementById('amt'), d = document.getElementById('desc');
        const amt = parseFloat(a.value);
        if (!amt) return;
        basket.push({ id: Date.now(), amt, desc: d.value || "Item", cat: document.getElementById('cat').value });
        a.value = ''; d.value = ''; d.style.height = 'auto';
        updateUI();
    }

    function removeFromBasket(id) { basket = basket.filter(i => i.id !== id); updateUI(); }

    function clearBasket() { if(confirm("Empty basket?")) { basket = []; updateUI(); } }

    function checkout() {
        basket.forEach(i => entries.unshift({ ...i, timestamp: Date.now() }));
        localStorage.setItem('commander_ledger_v10', JSON.stringify(entries));
        basket = [];
        updateUI();
        alert("Transaction Recorded.");
    }

    function updateUI() {
