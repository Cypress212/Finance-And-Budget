<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#10b981">
    <title>Commander MK</title>

    <link rel="manifest" href='data:application/json,{"name":"Commander MK","short_name":"Commander","start_url":"index.html","display":"standalone","background_color":"#fdfcf8","theme_color":"#10b981","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454282.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        /* The "No-Overflow" Reset */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #fdfcf8; /* Warm welcoming cream */
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --accent: #10b981; /* Fresh mint green */
            --text-main: #1e293b;
            --text-dim: #64748b;
            --danger: #ef4444;
            --shadow: rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #34d399;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background 0.3s ease;
            display: flex; justify-content: center;
        }

        .dashboard {
            width: 100%; max-width: 1200px;
            padding: 15px;
            display: grid; grid-template-columns: 1fr; gap: 20px;
        }

        @media (min-width: 1024px) {
            .dashboard { grid-template-columns: 400px 1fr; padding: 40px; }
            .sticky-side { position: sticky; top: 40px; height: fit-content; }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 12px var(--shadow);
            width: 100%; /* Ensures it stays inside parent */
            overflow: hidden; /* Clips anything trying to cross borders */
        }

        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; margin: 0 0 15px 0; color: var(--text-dim); }
        
        .budget-value { font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin: 5px 0; }

        input {
            width: 100%; border: 1px solid var(--border); padding: 16px; 
            margin-bottom: 12px; border-radius: 16px; background: var(--bg);
            color: var(--text-main); font-size: 16px; outline: none; transition: 0.2s;
        }

        input:focus { border-color: var(--accent); ring: 2px var(--accent); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.97); filter: brightness(0.9); }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; border-radius: 16px; background: var(--bg);
            border: 1px solid var(--border); margin-bottom: 10px;
            width: 100%;
        }

        .item-info { flex: 1; min-width: 0; padding-right: 10px; }
        .item-info span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
        .item-info small { color: var(--text-dim); font-size: 0.75rem; }

        .del-btn { background: none; border: none; color: var(--danger); font-size: 1.1rem; cursor: pointer; padding: 8px; font-weight: bold; }

        .theme-toggle {
            position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
            border-radius: 50%; background: var(--card); border: 1px solid var(--border);
            color: var(--text-main); cursor: pointer; z-index: 1000; font-size: 1.4rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        .progress-track { height: 6px; width: 100%; background: var(--border); border-radius: 10px; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--accent); border-radius: 10px; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="dashboard">
    <div class="sticky-side">
        <div class="card" style="border-top: 5px solid var(--accent);">
            <h2>Daily Budget Left</h2>
            <div class="budget-value" id="dailyDisplay">0</div>
            <div class="progress-track"><div class="progress-bar" id="progBar"></div></div>
            <div id="mathLabel" style="font-size: 0.8rem; color: var(--text-dim);">Ready for calculation.</div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Deployment</h2>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <input type="text" id="desc" placeholder="Item/Description">
            <button class="btn btn-primary" onclick="addToBasket()">🛒 Add to Basket</button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Monthly Target</h2>
            <input type="number" id="monthlyGoal" value="200000" oninput="updateUI()">
        </div>
    </div>

    <div>
        <div class="card">
            <h2 id="basketHeader">Live Basket (0)</h2>
            <div id="basketTotal" style="font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 20px;">MK 0</div>
            <div id="basketList"></div>
            <button class="btn btn-primary" id="payBtn" style="display:none; margin-top: 15px;" onclick="checkout()">🚀 Confirm Purchase</button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Operation History</h2>
            <div id="historyList" class="history-grid"></div>
            <button onclick="clearHistory()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:20px; font-size:0.7rem; cursor:pointer; font-weight: bold; opacity: 0.6;">WIPE ALL SYSTEM DATA</button>
        </div>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('commander_v2_perfect') || "[]");
    let basket = [];
    let theme = localStorage.getItem('commander_theme') || 'light';

    window.onload = () => { applyTheme(); updateUI(); };

    function addToBasket() {
        const a = document.getElementById('amt'), d = document.getElementById('desc');
        if (!a.value || a.value <= 0) return;
        basket.push({ id: Date.now(), amt: parseFloat(a.value), desc: d.value || "General Item" });
        a.value = ''; d.value = ''; updateUI();
    }

    function checkout() {
        if(basket.length === 0) return;
        basket.forEach(i => entries.unshift({ ...i, timestamp: Date.now() }));
        localStorage.setItem('commander_v2_perfect', JSON.stringify(entries));
        basket = []; updateUI();
    }

    function updateUI() {
        const goal = parseFloat(document.getElementById('monthlyGoal').value) || 1;
        const now = new Date();
        const spentThisMonth = entries
            .filter(e => new Date(e.timestamp).getMonth() === now.getMonth())
            .reduce((s, e) => s + e.amt, 0);

        const basketTotal = basket.reduce((s, e) => s + e.amt, 0);
        const daysLeft = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()) + 1;
        
        const dailyAllowance = (goal - spentThisMonth) / daysLeft;
        const finalDaily = Math.floor(dailyAllowance - basketTotal);

        // UI
        const display = document.getElementById('dailyDisplay');
        display.innerText = finalDaily.toLocaleString();
        display.style.color = finalDaily < 0 ? 'var(--danger)' : 'var(--accent)';

        document.getElementById('basketTotal').innerText = `MK ${basketTotal.toLocaleString()}`;
        document.getElementById('basketHeader').innerText = `Live Basket (${basket.length})`;
        document.getElementById('payBtn').style.display = basket.length > 0 ? 'block' : 'none';
        document.getElementById('mathLabel').innerText = `MK ${(goal - spentThisMonth).toLocaleString()} left this month • ${daysLeft} days remaining`;

        // Progress
        const percent = Math.min(100, Math.max(0, (spentThisMonth / goal) * 100));
        document.getElementById('progBar').style.width = percent + '%';

        // Lists
        document.getElementById('basketList').innerHTML = basket.map(i => `
            <div class="item-row">
                <div class="item-info"><span>${i.desc}</span><small>MK ${i.amt.toLocaleString()}</small></div>
                <button class="del-btn" onclick="basket = basket.filter(x => x.id !== ${i.id}); updateUI();">✕</button>
            </div>`).join('') || '<p style="opacity:0.4; text-align:center; font-size:0.9rem;">Basket is empty</p>';

        document.getElementById('historyList').innerHTML = entries.slice(0, 12).map(e => `
            <div class="item-row" style="background:transparent">
                <div class="item-info"><span>${e.desc}</span><small>${new Date(e.timestamp).toLocaleDateString()}</small></div>
                <b style="color:var(--text-main)">MK ${e.amt.toLocaleString()}</b>
            </div>`).join('');
    }

    function clearHistory() { if(confirm("Wipe all data?")) { entries = []; localStorage.setItem('commander_v2_perfect', "[]"); updateUI(); } }
    
    function applyTheme() { 
        document.documentElement.setAttribute('data-theme', theme); 
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
    }

    function toggleTheme() { 
        theme = (theme === 'light') ? 'dark' : 'light'; 
        localStorage.setItem('commander_theme', theme); 
        applyTheme(); 
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blob = new Blob([`self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }
</script>
</body>
</html>
