<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commander Vault PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* LOCK SCREEN */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--highlight);
            padding: 25px; width: 100%; max-width: 400px; margin-bottom: 25px;
            box-sizing: border-box;
        }

        .view { display: none; width: 100%; max-width: 400px; }
        .view.active { display: block; }

        .btn-push {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
        }
        .btn-push:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); }

        input, select {
            width: 100%; border: none; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box; font-size: 1rem;
        }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: var(--text); opacity: 0.5; padding: 10px; cursor: pointer;}
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .history-item {
            display: flex; flex-direction: column; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--highlight);
        }
        .receipt-thumb { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="neu-card" style="text-align: center;">
            <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
            <h2 style="color: var(--accent);">Vault Locked</h2>
            <p style="opacity: 0.6; font-size: 0.8rem; margin-bottom: 20px;">Use biometrics to access your commander ledger.</p>
            <button class="btn-push" onclick="triggerBiometric()">🔓 Unlock App</button>
            <div id="lock-error" style="color: var(--danger); font-size: 0.7rem; margin-top: 15px;"></div>
        </div>
    </div>

    <div id="dashView" class="view active">
        <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
            <label style="font-size: 0.7rem; opacity: 0.7;">Daily Allowance Left</label>
            <h1 style="color: var(--gold); margin: 5px 0;">MK <span id="dailyDisplay">0</span></h1>
        </div>

        <div class="neu-card">
            <label>Recording Entry</label>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <select id="cat">
                <option value="Food">Groceries</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills/Escom</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="desc" placeholder="Details...">
            
            <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="previewReceipt(this)">
            <button class="btn-push" style="color:var(--gold); font-size:0.8rem;" onclick="document.getElementById('cam-input').click()">📸 Snap Receipt</button>
            <img id="receipt-preview" src="" style="width:100%; border-radius:15px; margin-bottom:15px; display:none;">

            <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
            <input type="number" id="monthlyGoal" placeholder="Monthly Goal (MK)" oninput="updateUI()" style="margin-top:20px; font-size:0.7rem">
        </div>

        <div class="neu-card" style="text-align: center;">
            <label>Spent: <span id="totalDisplay">0</span> / Goal</label>
            <div style="height: 120px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeMonth(-1)" style="opacity:1">◀</button>
                <div id="displayMonth" style="font-weight:bold; color:var(--accent);">Month Year</div>
                <button class="nav-btn" onclick="changeMonth(1)" style="opacity:1">▶</button>
            </div>
            <div id="fullHistory"></div>
            <button class="btn-push" style="font-size:0.7rem; margin-top:20px;" onclick="exportToCSV()">📤 Export to Excel</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Home</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Ledger</button>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('mw_final_vault_v1') || "[]");
    let viewDate = new Date();
    let receiptData = null;
    let chart;

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    // 🔐 BIOMETRIC HANDLER
    async function triggerBiometric() {
        const errorEl = document.getElementById('lock-error');
        const isSecure = window.isSecureContext && window.PublicKeyCredential;

        if (!isSecure) {
            errorEl.innerHTML = `<span style="color:var(--text)">⚠️ Secure context (HTTPS) missing.</span><br>
                                <button onclick="unlockApp()" class="btn-push" style="margin-top:10px; font-size:0.7rem;">DEBUG UNLOCK</button>`;
            return;
        }

        try {
            const options = {
                publicKey: {
                    challenge: new Uint8Array([1, 2, 3, 4]),
                    rp: { name: "Wealth Commander" },
                    user: { id: new Uint8Array([1]), name: "user", displayName: "User" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    timeout: 10000,
                    authenticatorSelection: { userVerification: "required" }
                }
            };
            await navigator.credentials.create(options);
            unlockApp();
        } catch (err) {
            errorEl.innerHTML = `Verification failed.<br>
                                <button onclick="unlockApp()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer; margin-top:10px;">FORCE BYPASS</button>`;
        }
    }

    function unlockApp() {
        document.getElementById('lock-screen').style.display = 'none';
    }

    // --- APP CORE ---
    window.onload = () => {
        document.getElementById('monthlyGoal').value = localStorage.getItem('mw_goal') || 50000;
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{ data: [1,1,1,1], backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'], borderWidth: 0 }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function previewReceipt(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                receiptData = e.target.result;
                document.getElementById('receipt-preview').src = receiptData;
                document.getElementById('receipt-preview').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateUI() {
        const goal = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal', goal);
        const now = new Date();
        const filtered = entries.filter(e => new Date(e.ts).getMonth() === now.getMonth());
        const spent = filtered.reduce((sum, e) => sum + e.amt, 0);
        
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (lastDay - now.getDate()) + 1;
        const daily = (goal - spent) > 0 ? (goal - spent) / daysLeft : 0;
        
        document.getElementById('dailyDisplay').innerText = Math.floor(daily).toLocaleString();
        document.getElementById('totalDisplay').innerText = spent.toLocaleString();

        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        filtered.forEach(e => totals[e.cat] += e.amt);
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
        chart.update();
    }

    function saveEntry() {
        const amt = parseFloat(document.getElementById('amt').value);
        if (!amt) return;
        entries.unshift({
            amt, 
            cat: document.getElementById('cat').value, 
            desc: document.getElementById('desc').value || document.getElementById('cat').value, 
            ts: new Date().getTime(),
            receipt: receiptData
        });
        localStorage.setItem('mw_final_vault_v1', JSON.stringify(entries));
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('receipt-preview').style.display = 'none';
        receiptData = null;
        updateUI();
        alert("Committed to Ledger");
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
            updateUI();
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function renderHistory() {
        document.getElementById('displayMonth').innerText = months[viewDate.getMonth()] + " " + viewDate.getFullYear();
        const filtered = entries.filter(e => {
            let d = new Date(e.ts);
            return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear();
        });
        document.getElementById('fullHistory').innerHTML = filtered.map(e => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <div><strong>${e.desc}</strong><br><small>${new Date(e.ts).toLocaleDateString()}</small></div>
                    <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
                </div>
                ${e.receipt ? `<img src="${e.receipt}" class="receipt-thumb">` : ''}
            </div>
        `).join('') || `<p style="text-align:center; opacity:0.5;">No records for this month.</p>`;
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderHistory(); }
    
    function exportToCSV() {
        let csv = "Date,Description,Category,Amount\n";
        entries.forEach(e => csv += `${new Date(e.ts).toLocaleDateString()},"${e.desc}",${e.cat},${e.amt}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Vault_Ledger.csv'; a.click();
    }
</script>
</body>
</html>
