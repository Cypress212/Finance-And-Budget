<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Commander MK Ultra</title>

    <link rel="manifest" href='data:application/json,{"name":"Commander MK","short_name":"Commander","start_url":"index.html","display":"standalone","background_color":"#000000","theme_color":"#10b981","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454282.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #10b981; /* Neon Green */
            --danger: #ef4444;
            --text: #ffffff;
            --bg: #0f172a;
        }

        [data-theme="light"] {
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent: #059669;
            --text: #1e293b;
            --bg: #f8fafc;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center;
        }

        .dashboard {
            width: 100%; max-width: 1200px;
            padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 20px;
        }

        @media (min-width: 1024px) {
            .dashboard { grid-template-columns: 380px 1fr; padding: 40px; }
            .sticky-side { position: sticky; top: 40px; height: fit-content; }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .glass-card:hover { transform: translateY(-4px); }

        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 15px 0; opacity: 0.6; }
        
        .budget-value { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin: 10px 0; }

        input, select {
            width: 100%; border: 1px solid var(--glass-border); padding: 16px; 
            margin-bottom: 12px; border-radius: 16px; background: rgba(255,255,255,0.05);
            color: var(--text); font-size: 16px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-primary { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
        .btn-primary:active { transform: scale(0.96); }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-radius: 16px; background: var(--glass);
            margin-bottom: 10px; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .del-btn { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; padding: 5px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 48px; height: 48px;
            border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text); cursor: pointer; z-index: 1000; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }

        .progress-bar {
            height: 8px; width: 100%; background: var(--glass-border); border-radius: 4px; overflow: hidden; margin: 15px 0;
        }
        .progress-fill { height: 100%; background: var(--accent); transition: 0.5s ease; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="dashboard">
    <div class="sticky-side">
        <div class="glass-card" style="text-align: center; border-bottom: 4px solid var(--accent);">
            <h2>Daily Allowance</h2>
            <div class="budget-value" id="dailyDisplay">0</div>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <div id="mathInfo" style="font-size: 0.8rem; opacity: 0.5;">Calculating mission parameters...</div>
        </div>

        <div class="glass-card" style="margin-top: 20px;">
            <h2>Deploy Funds</h2>
            <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
            <input type="text" id="desc" placeholder="Target description">
            <button class="btn btn-primary" onclick="addToBasket()">🛒 Add to Basket</button>
        </div>

        <div class="glass-card" style="margin-top: 20px;">
            <h2>Mission Goal</h2>
            <input type="number" id="monthlyGoal" value="200000" oninput="updateUI()">
        </div>
    </div>

    <div>
        <div class="glass-card" style="min-height: 250px;">
            <h2>Live Basket</h2>
            <div id="basketTotal" style="font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 20px;">MK 0</div>
            <div id="basketList"></div>
            <button class="btn btn-primary" id="payBtn" style="display:none; margin-top: 20px;" onclick="checkout()">🚀 Confirm Transaction</button>
        </div>

        <div class="glass-card" style="margin-top: 20px;">
            <h2>Recent Operations</h2>
            <div id="historyList"></div>
            <button onclick="clearHistory()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:20px; font-size:0.7rem; cursor:pointer; opacity:0.5;">WIPE DATA CACHE</button>
        </div>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('commander_lit_v1') || "[]");
    let basket = [];
    let theme = localStorage.getItem('theme') || 'dark';

    window.onload = () => { applyTheme(); updateUI(); };

    function addToBasket() {
        const a = document.getElementById('amt'), d = document.getElementById('desc');
        if (!a.value || a.value <= 0) return;
        basket.push({ id: Date.now(), amt: parseFloat(a.value), desc: d.value || "Supply Drop" });
        a.value = ''; d.value = ''; updateUI();
    }

    function checkout() {
        basket.forEach(i => entries.unshift({ ...i, timestamp: Date.now() }));
        localStorage.setItem('commander_lit_v1', JSON.stringify(entries));
        basket = []; updateUI();
    }

    function updateUI() {
        const goal = parseFloat(document.getElementById('monthlyGoal').value) || 1;
        const now = new Date();
        const spentThisMonth = entries
            .filter(e => new Date(e.timestamp).getMonth() === now.getMonth())
            .reduce((s, e) => s + e.amt, 0);

        const basketTotal = basket.reduce((s, e) => s + e.amt, 0);
        const daysLeft = (new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate()) + 1;
        
        const dailyAllowance = (goal - spentThisMonth) / daysLeft;
        const finalDaily = Math.floor(dailyAllowance - basketTotal);

        // UI Updates
        const display = document.getElementById('dailyDisplay');
        display.innerText = finalDaily.toLocaleString();
        display.style.color = finalDaily < 0 ? 'var(--danger)' : 'var(--accent)';

        document.getElementById('basketTotal').innerText = `MK ${basketTotal.toLocaleString()}`;
        document.getElementById('payBtn').style.display = basket.length > 0 ? 'block' : 'none';
        document.getElementById('mathInfo').innerText = `MK ${(goal - spentThisMonth).toLocaleString()} remaining • ${daysLeft} days left`;

        // Progress Bar
        const percent = Math.min(100, Math.max(0, (spentThisMonth / goal) * 100));
        document.getElementById('progFill').style.width = percent + '%';

        // Lists
        document.getElementById('basketList').innerHTML = basket.map(i => `
            <div class="item-row">
                <span><b>${i.desc}</b><br><small>MK ${i.amt.toLocaleString()}</small></span>
                <button class="del-btn" onclick="basket = basket.filter(x => x.id !== ${i.id}); updateUI();">✕</button>
            </div>`).join('');

        document.getElementById('historyList').innerHTML = entries.slice(0, 10).map(e => `
            <div class="item-row" style="background: rgba(255,255,255,0.02)">
                <span>${e.desc}<br><small>${new Date(e.timestamp).toLocaleDateString()}</small></span>
                <b>MK ${e.amt.toLocaleString()}</b>
            </div>`).join('');
    }

    function clearHistory() { if(confirm("Clear all logs?")) { entries = []; localStorage.setItem('commander_lit_v1', "[]"); updateUI(); } }
    function applyTheme() { 
        document.documentElement.setAttribute('data-theme', theme); 
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        document.body.style.backgroundColor = theme === 'dark' ? '#0f172a' : '#f8fafc';
    }
    function toggleTheme() { theme = (theme === 'light') ? 'dark' : 'light'; localStorage.setItem('theme', theme); applyTheme(); }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blob = new Blob([`self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }
</script>
</body>
</html>
