<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Commander MK</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
            --sidebar-w: 0px;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.3s ease;
            min-height: 100vh; box-sizing: border-box;
        }

        /* --- PC DESKTOP GRID LAYOUT (ZERO SCROLL) --- */
        @media (min-width: 1024px) {
            :root { --sidebar-w: 220px; }
            body { 
                padding: 30px;
                padding-left: calc(var(--sidebar-w) + 40px); 
                align-items: stretch;
                overflow: hidden; /* Prevents body scroll on PC */
            }
            .nav-bar {
                top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
                flex-direction: column; border-radius: 0; padding: 40px 20px;
                justify-content: flex-start; gap: 15px;
            }
            .nav-btn { width: 100%; text-align: left; padding: 15px; border-radius: 12px; }
            .nav-btn.active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); }
            
            /* Dashboard Grid */
            .view.active#dashView {
                display: grid;
                grid-template-columns: 1fr 1.2fr; /* Two main columns */
                grid-template-rows: auto 1fr;
                gap: 25px;
                height: calc(100vh - 60px);
                max-width: 1400px;
            }

            .card-stats { grid-column: 1; display: flex; gap: 20px; } /* Small cards side by side */
            .card-form { grid-column: 1; grid-row: 2; } /* Input form below stats */
            .card-visuals { grid-column: 2; grid-row: 1 / span 2; display: flex; flex-direction: column; } /* Chart & List on right */
            
            .neu-card { margin-bottom: 0; width: 100%; max-width: none; }
            #fullHistory { max-height: 60vh; overflow-y: auto; padding-right: 10px; }
        }

        /* --- UI ELEMENTS --- */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg); border: none; box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            cursor: pointer; z-index: 1000;
        }

        .neu-card {
            background: var(--bg); border-radius: 25px;
            box-shadow: 8px 8px 15px var(--shadow), -8px -8px 15px var(--highlight);
            padding: 20px; width: 100%; max-width: 400px; margin-bottom: 20px;
            box-sizing: border-box;
        }

        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .allowance-vibe { font-size: 1.8rem; color: var(--gold); font-weight: 800; margin: 5px 0; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; font-weight: bold; }

        input, select {
            width: 100%; border: none; padding: 14px; margin-bottom: 12px;
            border-radius: 12px; background: var(--bg);
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box;
        }

        .btn-push {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: var(--bg); color: var(--accent); font-weight: 800;
            box-shadow: 5px 5px 10px var(--shadow), -5px -5px 10px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
        }
        .btn-push:active { box-shadow: inset 3px 3px 6px var(--shadow), inset -3px -3px 6px var(--highlight); transform: scale(0.98); }

        .nav-bar {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
            background: var(--bg); padding: 10px 20px; border-radius: 50px;
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--highlight);
            z-index: 100;
        }
        .nav-btn { border: none; background: none; font-weight: bold; color: var(--text); opacity: 0.5; cursor: pointer; padding: 10px; }
        .nav-btn.active { opacity: 1; color: var(--accent); }

        .history-item {
            display: flex; flex-direction: column; padding: 15px; margin-bottom: 12px;
            border-radius: 15px; background: var(--bg); position: relative;
            box-shadow: 3px 3px 7px var(--shadow), -3px -3px 7px var(--highlight);
        }
        .del-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="dashView" class="view active">
        
        <div class="card-stats">
            <div class="neu-card" style="text-align: center;">
                <label>Days Left</label>
                <div id="daysLeftText" style="font-size: 1.5rem; font-weight: 800;">--</div>
            </div>
            <div class="neu-card" style="text-align: center; border: 2px solid var(--gold);">
                <label>Daily Allowance</label>
                <div class="allowance-vibe">MK <span id="dailyLimitDisplay">0</span></div>
            </div>
        </div>

        <div class="card-form">
            <div class="neu-card">
                <label>New Entry</label>
                <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
                <select id="cat">
                    <option value="Food">Groceries</option>
                    <option value="Transport">Transport</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="desc" placeholder="Details...">
                
                <input type="file" id="media-input" accept="image/*" style="display:none" onchange="previewMedia(this)">
                <button class="btn-push" id="media-btn" style="color:var(--gold)" onclick="document.getElementById('media-input').click()">📸 Snap/Upload</button>
                <img id="receipt-preview" src="" style="width:100%; border-radius:15px; margin-bottom:15px; display:none; max-height: 150px; object-fit: cover;">

                <button class="btn-push" onclick="saveEntry()">Commit Entry</button>
                <input type="number" id="monthlyGoal" placeholder="Monthly Goal (MK)" oninput="updateUI()" style="margin-top:10px; font-size:0.8rem">
            </div>
        </div>

        <div class="card-visuals">
            <div class="neu-card" style="text-align: center; flex: 1;">
                <label>Monthly Spend: MK <span id="totalDisplay">0</span></label>
                <div style="height: 180px;"><canvas id="mainChart"></canvas></div>
                <hr style="opacity: 0.1; margin: 15px 0;">
                <label>Recent Ledger</label>
                <div id="recentHistory" style="text-align: left; font-size: 0.85rem;"></div>
            </div>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card" style="max-width: 900px; margin: auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <button class="nav-btn" onclick="changeMonth(-1)" style="opacity:1">◀</button>
                <div id="displayMonth" style="font-weight:bold; font-size: 1.2rem;">Month Year</div>
                <button class="nav-btn" onclick="changeMonth(1)" style="opacity:1">▶</button>
            </div>
            <div id="fullHistory"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="desktop-only" style="padding: 10px; font-weight: 900; color: var(--accent); font-size: 1.2rem; margin-bottom: 20px;">COMMANDER</div>
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">🏠 Dashboard</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">📜 Full Ledger</button>
    </div>

<script>
    // All Logic remains identical to keep mobile/PC synced perfectly
    let entries = JSON.parse(localStorage.getItem('mw_pro_ledger_v3') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal_v1') || 50000;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let viewDate = new Date();
    let receiptData = null;
    let chart;

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('monthlyGoal').value = monthlyGoal;
        
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const mediaInput = document.getElementById('media-input');
        if (isMobile) mediaInput.setAttribute('capture', 'environment');

        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Transport', 'Bills', 'Other'],
                datasets: [{ data: [1,1,1,1], backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'], borderWidth: 0 }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function previewMedia(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    receiptData = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('receipt-preview').src = receiptData;
                    document.getElementById('receipt-preview').style.display = 'block';
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateUI() {
        const goal = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal_v1', goal);
        const now = new Date();
        const filtered = entries.filter(e => new Date(e.timestamp).getMonth() === now.getMonth());
        const spent = filtered.reduce((sum, e) => sum + e.amt, 0);
        
        document.getElementById('totalDisplay').innerText = spent.toLocaleString();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (daysInMonth - now.getDate()) + 1;
        document.getElementById('dailyLimitDisplay').innerText = Math.max(0, Math.floor((goal - spent) / daysLeft)).toLocaleString();
        document.getElementById('daysLeftText').innerText = daysLeft;

        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        filtered.forEach(e => totals[e.cat] += e.amt);
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
        chart.update();

        // Quick history update for PC side-panel
        const recent = filtered.slice(0, 5);
        document.getElementById('recentHistory').innerHTML = recent.map(e => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid rgba(0,0,0,0.05)">
                <span>${e.desc || e.cat}</span>
                <b>MK ${e.amt.toLocaleString()}</b>
            </div>
        `).join('') || 'No entries yet.';
    }

    function saveEntry() {
        const amtInput = document.getElementById('amt');
        const amt = parseFloat(amtInput.value);
        if (!amt) return;
        
        entries.unshift({ 
            id: Date.now(),
            amt, 
            cat: document.getElementById('cat').value, 
            desc: document.getElementById('desc').value, 
            receipt: receiptData,
            timestamp: new Date().getTime() 
        });
        localStorage.setItem('mw_pro_ledger_v3', JSON.stringify(entries));
        
        amtInput.value = '';
        document.getElementById('desc').value = '';
        document.getElementById('receipt-preview').style.display = 'none';
        receiptData = null;
        updateUI();
    }

    function deleteEntry(id) {
        if(confirm("Delete entry?")) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('mw_pro_ledger_v3', JSON.stringify(entries));
            renderHistory();
            updateUI();
        }
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
            updateUI();
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function renderHistory() {
        document.getElementById('displayMonth').innerText = months[viewDate.getMonth()] + " " + viewDate.getFullYear();
        const filtered = entries.filter(e => new Date(e.timestamp).getMonth() === viewDate.getMonth() && new Date(e.timestamp).getFullYear() === viewDate.getFullYear());
        
        document.getElementById('fullHistory').innerHTML = filtered.map(e => `
            <div class="history-item">
                <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
                <div style="display:flex; justify-content:space-between; margin-right: 30px;">
                    <div><strong>${e.desc || e.cat}</strong><br><small>${new Date(e.timestamp).toLocaleDateString()}</small></div>
                    <div style="font-weight:bold; color:var(--accent);">MK ${e.amt.toLocaleString()}</div>
                </div>
                ${e.receipt ? `<img src="${e.receipt}" class="receipt-thumb" onclick="window.open(this.src)">` : ''}
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.5;">No records.</p>';
    }

    function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderHistory(); }
    
    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
    }
</script>
</body>
</html>
