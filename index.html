<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Commander MK</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #e0e5ec; --shadow: #a3b1c6; --highlight: #ffffff;
            --accent: #2d5a27; --danger: #d32f2f; --gold: #b19470; --text: #444;
            --sidebar-w: 0px;
        }
        [data-theme="dark"] {
            --bg: #1d2126; --shadow: #121519; --highlight: #282d34;
            --accent: #4caf50; --text: #e0e0e0; --gold: #d4af37;
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; padding-bottom: 100px;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.4s ease;
            min-height: 100vh; box-sizing: border-box;
        }

        /* --- THE COOL FLOATING THEME BUTTON --- */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px; width: 54px; height: 54px; border-radius: 50%;
            background: var(--bg); border: none; 
            box-shadow: 8px 8px 15px var(--shadow), -8px -8px 15px var(--highlight);
            cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; transition: all 0.3s ease;
        }
        .theme-toggle:hover { transform: rotate(15deg) scale(1.1); }
        .theme-toggle:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); transform: scale(0.95); }

        /* --- PC GRID --- */
        @media (min-width: 1024px) {
            :root { --sidebar-w: 240px; }
            body { padding: 30px; padding-left: calc(var(--sidebar-w) + 40px); align-items: stretch; overflow: hidden; }
            .nav-bar { top: 0; left: 0; bottom: 0; width: var(--sidebar-w); flex-direction: column; border-radius: 0; padding: 40px 20px; justify-content: flex-start; gap: 15px; }
            #dashView.active { display: grid; grid-template-columns: 420px 1fr; grid-template-rows: auto 1fr; gap: 30px; height: calc(100vh - 60px); max-width: 1400px; }
            .card-stats { grid-column: 1 / span 2; display: flex; gap: 30px; }
            .card-form { grid-column: 1; grid-row: 2; overflow-y: auto; padding-right: 10px; }
            .card-visuals { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; gap: 20px; }
        }

        .neu-card {
            background: var(--bg); border-radius: 30px;
            box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--highlight);
            padding: 25px; width: 100%; box-sizing: border-box; margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .allowance-vibe { font-size: 2.4rem; color: var(--gold); font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 12px; font-weight: 900; letter-spacing: 1px; }

        input, select, textarea {
            width: 100%; max-width: 100%; border: none; padding: 18px; margin-bottom: 15px;
            border-radius: 18px; background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: var(--text); outline: none; box-sizing: border-box; font-size: 1rem;
            font-family: inherit; resize: none; transition: all 0.2s ease;
        }
        input:focus { box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--highlight); }

        /* --- THE COOL BUTTONS --- */
        .btn-push {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            background: var(--bg); color: var(--accent); font-weight: 900;
            box-shadow: 6px 6px 14px var(--shadow), -6px -6px 14px var(--highlight);
            cursor: pointer; text-transform: uppercase; margin-bottom: 15px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-push:hover { transform: translateY(-3px); box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--highlight); color: var(--gold); }
        .btn-push:active { transform: translateY(1px) scale(0.98); box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); }
        
        .btn-danger { color: var(--danger) !important; font-size: 0.7rem; padding: 10px; margin-top: 30px; opacity: 0.7; }
        .btn-danger:hover { opacity: 1; }

        .nav-bar { position: fixed; bottom: 20px; display: flex; gap: 20px; background: var(--bg); padding: 12px 25px; border-radius: 50px; box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--highlight); z-index: 100; }
        .nav-btn { border: none; background: none; font-weight: 900; color: var(--text); opacity: 0.4; cursor: pointer; padding: 12px 18px; transition: all 0.3s ease; border-radius: 25px; }
        .nav-btn.active { opacity: 1; color: var(--accent); box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--highlight); }

        .history-item { display: flex; flex-direction: column; padding: 20px; margin-bottom: 18px; border-radius: 25px; background: var(--bg); position: relative; box-shadow: 5px 5px 12px var(--shadow), -5px -5px 12px var(--highlight); transition: transform 0.2s ease; }
        .history-item:hover { transform: scale(1.02); }
        .del-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.4rem; filter: grayscale(1); transition: 0.2s; }
        .del-btn:hover { filter: grayscale(0); transform: rotate(90deg); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="dashView" class="view active">
        <div class="card-stats">
            <div class="neu-card" style="flex: 1; text-align: center;">
                <label>Days Left</label>
                <div id="daysLeftText" style="font-size: 2.2rem; font-weight: 900; color: var(--accent);">--</div>
            </div>
            <div class="neu-card" style="flex: 2; text-align: center; border: 2px solid var(--gold);">
                <label>Daily Limit (MK)</label>
                <div class="allowance-vibe"><span id="dailyLimitDisplay">0</span></div>
            </div>
        </div>

        <div class="card-form">
            <div class="neu-card">
                <label>Add Expense</label>
                <input type="number" id="amt" placeholder="Amount (MK)" inputmode="decimal">
                <select id="cat">
                    <option value="Food">🍱 Groceries / Food</option>
                    <option value="Transport">⛽ Transport / Fuel</option>
                    <option value="Bills">🏠 Bills / Rent</option>
                    <option value="Other">🌀 Miscellaneous</option>
                </select>
                <textarea id="desc" placeholder="Mission details..." oninput="autoExpand(this)"></textarea>
                <input type="file" id="media-input" accept="image/*" style="display:none" onchange="previewMedia(this)">
                <button class="btn-push" id="media-btn" style="color:var(--gold)" onclick="document.getElementById('media-input').click()">📸 Photo Receipt</button>
                <img id="receipt-preview" src="" style="width:100%; border-radius:20px; margin-bottom:15px; display:none; max-height: 220px; object-fit: cover;">
                <button class="btn-push" onclick="saveEntry()">🚀 Commit Entry</button>
                <input type="number" id="monthlyGoal" placeholder="Goal (MK)" oninput="updateUI()" style="margin-top:20px; font-size:0.8rem; text-align:center; box-shadow: none; border-bottom: 1px solid var(--shadow); border-radius: 0;">
            </div>
        </div>

        <div class="card-visuals">
            <div class="neu-card" style="flex: 1; text-align: center; display: flex; flex-direction: column;">
                <label>Monthly Progress: MK <span id="totalDisplay">0</span></label>
                <div style="flex: 1; min-height: 220px;"><canvas id="mainChart"></canvas></div>
                <hr style="opacity: 0.05; margin: 25px 0;">
                <label>Live Stream</label>
                <div id="recentHistory" style="text-align: left; font-size: 0.95rem; overflow-y: auto; max-height: 220px;"></div>
            </div>
        </div>
    </div>

    <div id="histView" class="view">
        <div class="neu-card" style="max-width: 900px; margin: auto; height: 85vh; overflow-y: auto; position: relative;">
            <div id="fullHistory"></div>
            <button class="btn-push btn-danger" onclick="clearAllData()">⚠️ Wipe All Ledger Data</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="nbDash" onclick="showView('dash')">HOME</button>
        <button class="nav-btn" id="nbHist" onclick="showView('hist')">LEDGER</button>
    </div>

<script>
    function autoExpand(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }

    let entries = JSON.parse(localStorage.getItem('mw_pro_ledger_v3') || "[]");
    let monthlyGoal = localStorage.getItem('mw_goal_v1') || 150000;
    let currentTheme = localStorage.getItem('theme') || 'light';
    let chart;

    window.onload = () => {
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        document.getElementById('monthlyGoal').value = monthlyGoal;
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Food', 'Transport', 'Bills', 'Other'], datasets: [{ data: [1,1,1,1], backgroundColor: ['#2d5a27', '#6c757d', '#b19470', '#333'], borderWidth: 0, hoverOffset: 10 }] },
            options: { cutout: '78%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function updateUI() {
        const goal = document.getElementById('monthlyGoal').value;
        localStorage.setItem('mw_goal_v1', goal);
        const now = new Date();
        const filtered = entries.filter(e => {
            const d = new Date(e.timestamp);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
        const spent = filtered.reduce((sum, e) => sum + e.amt, 0);
        document.getElementById('totalDisplay').innerText = spent.toLocaleString();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (daysInMonth - now.getDate()) + 1;
        document.getElementById('dailyLimitDisplay').innerText = Math.max(0, Math.floor((goal - spent) / daysLeft)).toLocaleString();
        document.getElementById('daysLeftText').innerText = daysLeft;
        
        let totals = { Food: 0, Transport: 0, Bills: 0, Other: 0 };
        filtered.forEach(e => totals[e.cat] += e.amt);
        chart.data.datasets[0].data = [totals.Food, totals.Transport, totals.Bills, totals.Other];
        chart.update();

        const recent = filtered.slice(0, 6);
        document.getElementById('recentHistory').innerHTML = recent.map(e => `
            <div style="display:flex; justify-content:space-between; padding: 12px 0; border-bottom:1px solid rgba(0,0,0,0.03)">
                <span style="font-weight:600;">${e.desc || e.cat}</span>
                <b style="color:var(--accent)">MK ${e.amt.toLocaleString()}</b>
            </div>
        `).join('') || '<p style="opacity:0.4; text-align:center">Waiting for data...</p>';
    }

    let receiptData = null;
    function previewMedia(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    receiptData = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('receipt-preview').src = receiptData;
                    document.getElementById('receipt-preview').style.display = 'block';
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveEntry() {
        const amtInput = document.getElementById('amt');
        const descInput = document.getElementById('desc');
        const amt = parseFloat(amtInput.value);
        if (!amt) return;
        entries.unshift({ id: Date.now(), amt, cat: document.getElementById('cat').value, desc: descInput.value, receipt: receiptData, timestamp: new Date().getTime() });
        localStorage.setItem('mw_pro_ledger_v3', JSON.stringify(entries));
        amtInput.value = ''; descInput.value = ''; descInput.style.height = 'auto';
        document.getElementById('receipt-preview').style.display = 'none';
        receiptData = null;
        updateUI();
    }

    function clearAllData() {
        if(confirm("DANGER: This will permanently delete ALL receipts and history. Proceed?")) {
            if(confirm("Final warning: Are you absolutely sure?")) {
                entries = [];
                localStorage.setItem('mw_pro_ledger_v3', "[]");
                renderHistory();
                updateUI();
            }
        }
    }

    function deleteEntry(id) {
        entries = entries.filter(e => e.id !== id);
        localStorage.setItem('mw_pro_ledger_v3', JSON.stringify(entries));
        renderHistory();
        updateUI();
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        if(v === 'dash') {
            document.getElementById('dashView').classList.add('active');
            document.getElementById('nbDash').classList.add('active');
            updateUI();
        } else {
            document.getElementById('histView').classList.add('active');
            document.getElementById('nbHist').classList.add('active');
            renderHistory();
        }
    }

    function renderHistory() {
        document.getElementById('fullHistory').innerHTML = entries.map(e => `
            <div class="history-item">
                <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
                <div style="display:flex; justify-content:space-between; margin-right: 40px;">
                    <div style="flex: 1;"><b style="font-size:1.1rem;">${e.desc || e.cat}</b><br><small style="opacity:0.6;">${new Date(e.timestamp).toLocaleDateString()}</small></div>
                    <div style="font-weight:900; color:var(--accent); font-size:1.2rem;">MK ${e.amt.toLocaleString()}</div>
                </div>
                ${e.receipt ? `<img src="${e.receipt}" class="receipt-thumb" style="width:100%; border-radius:18px; margin-top:15px;" onclick="window.open(this.src)">` : ''}
            </div>
        `).join('') || '<p style="text-align:center; padding: 50px; opacity:0.5;">No history found.</p>';
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeBtn').innerText = currentTheme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('theme', currentTheme);
    }
</script>
</body>
</html>
